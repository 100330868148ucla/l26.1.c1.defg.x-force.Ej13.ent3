<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>UCLA - Ejercicio 13: Trabajadores Empresa</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
      }
      .form-group {
        margin-bottom: 10px;
      }
      label {
        display: inline-block;
        width: 120px;
      }
      #resultados {
        margin-top: 20px;
        border-top: 2px solid #ccc;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Registro de Trabajadores</h1>

    <div class="form-group">
      <label>Nombre:</label>
      <input type="text" id="inNombre" />
    </div>
    <div class="form-group">
      <label>Horas Reg.:</label>
      <input type="number" id="inHReg" />
    </div>
    <div class="form-group">
      <label>Horas Ext.:</label>
      <input type="number" id="inHExt" />
    </div>
    <div class="form-group">
      <label>Tipo Persona:</label>
      <select id="inTipo">
        <option value="N">Natural</option>
        <option value="J">Jurídica</option>
        <option value="E">Extranjera</option>
      </select>
    </div>

    <button id="btnAceptar">Aceptar</button>

    <div id="output">
      <h3>Lista de Procesados:</h3>
      <div id="listaTrabajadores"></div>
    </div>

    <div id="resultados">
      <h3>Reporte de Nómina:</h3>
      <div id="detalleReporte">Esperando datos...</div>
    </div>

    <script type="module">
      import Cl_cEmpresa from "./dist/controllers/Cl_cEmpresa.js";
      const empresaCtrl = new Cl_cEmpresa();
    </script>
  </body>
</html>
